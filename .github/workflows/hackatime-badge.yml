name: Hackatime Badge

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Install Node dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@2

- name: Generate Hackatime badge
        env:
          HACKATIME_SECRET: ${{ secrets.HACKATIME_SECRET }}
        run: node scripts/generate-hackatime-badge.js

      # Push SVG to repo
      - name: Push Badge
        uses: ad-m/github-push-action@v0.6.0
        with:
          branch: master
          folder: ./badges
          github_token: ${{ secrets.GITHUB_TOKEN }}
